<title>QA Test Report — Capital Layer (Print)</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif&family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@500;600;700&display=swap" rel="stylesheet">

<style>
  html, body { margin: 0; padding: 0; background: #ffffff; font-family: 'Inter', system-ui, sans-serif; }
  *, *::before, *::after { box-sizing: border-box; }

  /* Screen preview — stack pages with a little spacing so what you see is what prints. */
  .print-root { display: flex; flex-direction: column; align-items: center; gap: 24px; padding: 24px 0; background: #e6eaee; }
  .print-page {
    background: #fff;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    overflow: hidden;
  }

  /* ── Print ────────────────────────────────────────────────── */
  @page {
    size: 1440px 2540px;   /* tallest artboard + a little slack for the tallest (zh report = 2500) */
    margin: 0;
  }
  @media print {
    html, body { background: #ffffff; }
    .print-root { gap: 0; padding: 0; background: #ffffff; }
    .print-page {
      box-shadow: none;
      break-after: page;
      page-break-after: always;
      break-inside: avoid;
      page-break-inside: avoid;
      width: 1440px !important;
    }
    .print-page:last-child { break-after: auto; page-break-after: auto; }
    /* Preserve background colors / dark themes if user flips theme to dark */
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }
  }
</style>
